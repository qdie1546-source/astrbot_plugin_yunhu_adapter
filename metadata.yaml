name: yunhu_test
display_name: 云湖SDK测试插件
description: 验证云湖IM SDK安装和API连通性
author: 星落云
version: 1.0.0
repo: https://github.com/qdie1546-source/astrbot_plugin_yunhu_test
config:
  - key: app_id
    type: string
    label: 云湖App ID
    required: true
  - key: app_secret
    type: string
    label: 云湖App Secret
    required: true
  - key: base_url
    type: string
    label: API地址
    default: https://api.yhchat.com/v1
  - key: websocket_url
    type: string
    label: WebSocket地址
    default: wss://ws.yhchat.com/v1